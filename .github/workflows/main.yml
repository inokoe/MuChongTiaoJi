name: 'MuchongTiaoJi'
on:
  # push:
  #   branches:
  #     - main
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'
env:
    token: ${{secrets.token}}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          ref: master
          token: ${{ secrets.key }}
      - name: Setup Python
        uses: actions/setup-python@v2
      - name: Install
        run: pip install -r requirements.txt
      - name: Run Python
        run: python main.py
      - name: Commit files
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Action Commit
          push_options: --force
